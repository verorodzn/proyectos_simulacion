        <div class="counter">
            Reinas colocadas: <span id="queenCount">0</span> / 8
        </div>

        <div class="controls">
            <h3>Seleccione el tipo de reina:</h3>
            <div class="button-group">
                <button id="btn1" onclick="selectQueen('1', this)">♛ Reina 1</button>
                <button id="btn2" class="active" onclick="selectQueen('2', this)">♕ Reina 2</button>
                <button id="btn3" onclick="selectQueen('3', this)">♚ Reina 3</button>
            </div>
        </div>

        <div class="controls">
            <h3>Personalizar colores del tablero:</h3>
            <div class="color-controls">
                <div class="color-item">
                    <label>Color claro:</label>
                    <input type="color" id="color1" value="#eeeed2" onchange="updateColors()">
                </div>
                <div class="color-item">
                    <label>Color oscuro:</label>
                    <input type="color" id="color2" value="#769656" onchange="updateColors()">
                </div>
            </div>
            <button class="reset-btn" onclick="resetBoard()">🔄 Reiniciar Tablero</button>
        </div>
